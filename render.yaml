services:
  - type: web
    name: seatflow-api
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seatflow-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: seatflow-db
    databaseName: seatflow
    user: seatflow_user
    region: ohio
    plan: free
